<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagamento Confirmado - RiseLab</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { background-color: #f8fafc; font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div class="max-w-md w-full bg-white p-8 rounded-[2rem] shadow-lg border border-gray-100 text-center">
        
        <div class="w-20 h-20 bg-green-100 text-green-500 rounded-full flex items-center justify-center mx-auto mb-6">
            <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
        </div>

        <h1 class="text-2xl font-black text-gray-900 mb-2">Pagamento Recebido!</h1>
        <p class="text-gray-500 mb-8">Obrigado pela sua compra. O seu acesso foi liberado com sucesso.</p>

        <a id="download-btn" href="#" target="_blank" class="block w-full py-4 bg-[#2563eb] hover:bg-blue-700 text-white font-bold rounded-xl transition-all shadow-lg shadow-blue-600/30 mb-4">
            ACESSAR MEU PRODUTO
        </a>

        <p class="text-xs text-gray-400">Um recibo também foi enviado para o seu email e WhatsApp.</p>
    </div>

    <script>
        // Captura o link mágico que enviámos lá do index.html
        const params = new URLSearchParams(window.location.search);
        const downloadLink = params.get('link');
        const ref = params.get('ref');

        const btn = document.getElementById('download-btn');

        if (downloadLink && downloadLink !== '#') {
            btn.href = downloadLink;
        } else {
            // Se por acaso não houver link de download
            btn.innerText = "ENTRAR EM CONTACTO";
            btn.href = "https://wa.me/258840000000"; // Coloque o seu WhatsApp de suporte aqui
        }

        // Bônus: Se quiser, pode fazer um "fetch" aqui para o seu Render 
        // para confirmar se o status da "ref" realmente está 'paid'.
    </script>
</body>
</html>
